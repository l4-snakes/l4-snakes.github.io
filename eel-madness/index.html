<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Eel Madness</title>
<meta name="description" content="Eat the Eel's favorite meals. Swim a wig-wearing eel through an endless kelp forest, catch the falling food, and turn a dark sea bright and alive. Free in the browser, phone-friendly.">
<link rel="canonical" href="https://l4-snakes.github.io/eel-madness/">
<meta name="theme-color" content="#020a0e">
<!-- Social previews (scrapers need absolute URLs). thumb1_long (2:1) leads —
     closest to the 1.91:1 large cards; the square rides along for apps that
     prefer it. Scrapers cache hard: after changing these, re-scrape with the
     platform debuggers to see updates. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Eel Madness">
<meta property="og:title" content="Eel Madness">
<meta property="og:description" content="Eat the Eel's favorite meals. Guide a fabulous Eel through an endless kelp forest and turn a dark sea bright and alive.">
<meta property="og:url" content="https://l4-snakes.github.io/eel-madness/">
<meta property="og:image" content="https://l4-snakes.github.io/eel-madness/assets/thumb1_long.png">
<meta property="og:image:width" content="1457">
<meta property="og:image:height" content="729">
<meta property="og:image:alt" content="A black Eel with a flowing platinum wig dives through a sunbeamed teal sea, among small fish, seagrass, and falling snacks.">
<meta property="og:image" content="https://l4-snakes.github.io/eel-madness/assets/thumb1_square.png">
<meta property="og:image:width" content="999">
<meta property="og:image:height" content="998">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Eel Madness">
<meta name="twitter:description" content="Eat the Eel's favorite meals. Guide a fabulous Eel through an endless kelp forest and turn a dark sea bright and alive.">
<meta name="twitter:image" content="https://l4-snakes.github.io/eel-madness/assets/thumb1_long.png">
<meta name="twitter:image:alt" content="A black Eel with a flowing platinum wig dives through a sunbeamed teal sea, among small fish, seagrass, and falling snacks.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="water"></canvas>
<svg id="eel-layer" xmlns="http://www.w3.org/2000/svg">
  <g id="rocks"></g>
  <g id="critters"></g>
  <g id="food"></g>
  <g id="eel">
    <rect id="eel-damage"/>
    <path id="eel-mouth"/>
    <path id="eel-body"/>
    <path id="eel-lip"/>
    <path id="eel-shadow"/>
    <ellipse id="eel-eye"/>
    <circle id="eel-pupil"/>
    <circle id="eel-shine"/>
    <g id="eel-lashes"></g>
    <g id="eel-wig"></g>
  </g>
  <g id="fg"></g>
</svg>
<div id="veil"></div>
<svg id="glow-layer" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-grad">
      <stop offset="0%" stop-color="#bfeeff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#bfeeff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#bfeeff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="bg-glows"></g>
  <g id="glows"></g>
  <g id="hearts"></g>
</svg>
<div id="flash"></div>
<div id="title">
  <div id="title-save" hidden></div>
  <div id="title-card">
    <div id="title-head">
      <h1 id="title-name">Eel Madness</h1>
      <p id="title-tag">eat the Eel&rsquo;s · favorite meals</p>
    </div>
    <div id="title-buttons">
      <button id="t-start">Start</button>
      <button id="t-skip">Skip To The End</button>
      <button id="t-settings">Settings</button>
      <button id="t-reset" hidden>Reset</button>
    </div>
  </div>
  <div id="settings" hidden>
    <div id="settings-panel">
      <h2>Settings</h2>
      <div class="set-row">
        <span>Joystick side</span>
        <div class="set-seg">
          <button id="set-stick-left">Left</button>
          <button id="set-stick-right">Right</button>
        </div>
      </div>
      <button id="settings-done">Done</button>
    </div>
  </div>
</div>
<div id="hint" class="hidden">WASD / arrows to swim &mdash; or press &amp; hold</div>
<div id="levelups"></div>
<div id="combo"></div>
<div id="ui">
  <button id="pause" aria-label="Pause">&#10074;&#10074;</button>
  <div id="menu" hidden>
    <div id="menu-panel">
      <div id="meters"></div>
      <button id="resume">Resume</button>
      <button id="tomenu">Main Menu</button>
      <button id="reset">Reset progress</button>
    </div>
  </div>
  <button id="btn-greet" aria-label="Greet" hidden>&#9825;</button>
  <button id="btn-sprint" aria-label="Sprint" hidden>&#9889;</button>
  <button id="btn-flare" aria-label="Flare" hidden>&#10022;</button>
  <div id="joypad" hidden><div id="joynub"></div></div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
